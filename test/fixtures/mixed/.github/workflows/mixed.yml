name: Mixed forms
on: [push]

jobs:
  call-reusable:
    uses: octo-org/example-repo/.github/workflows/reusable.yml@v2
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # trailing comment
      - uses: "actions/setup-node@v4.1"
      - uses: 'octo-org/tool/subdir/action@v1.2.3'
      - uses: ./local/action
      - uses: docker://alpine:3.20
      - uses: actions/checkout@v4
      - uses: pinned/action@8f4b7f84864484a7bf31766abe9204da3cbe65b3
      - uses: dynamic/action@${{ inputs.version }}
      - uses: branchy/action@main
      - uses: broken-no-ref@
