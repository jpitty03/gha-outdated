version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
